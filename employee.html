<!DOCTYPE html>
<html>
<head>
<title>Employee Dashboard</title>
</head>

<body>

<h2>Available Trainings</h2>

<button onclick="getTrainings()">Load Trainings</button>

<ul id="trainingList"></ul>

<h2>My Enrollments</h2>

<button onclick="getMyEnrollments()">View My Enrollments</button>

<ul id="myEnrollments"></ul>

<script src="script.js"></script>

<script>
  window.onload = async function() {
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "index.html"; // redirect if no token
      return;
    }

    // Call functions to load data
    try {
      if (typeof getTrainings === "function") await getTrainings();
      if (typeof myEnrollments === "function") await myEnrollments();
    } catch (err) {
      console.error("Error loading trainings or enrollments:", err);
    }
  }
</script>

</body>
</html>
