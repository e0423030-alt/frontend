<!DOCTYPE html>
<html>
<head>
<title>Trainer Dashboard</title>
</head>

<body>

<h2>Create Training</h2>

<input id="trainingName" placeholder="Training Name"><br><br>
<input id="description" placeholder="Description"><br><br>
<input id="seatLimit" placeholder="Seat Limit"><br><br>

<button onclick="createTraining()">Create Training</button>

<h2>My Trainings</h2>
<button onclick="myTrainings()">View My Trainings</button>

<ul id="trainerTrainings"></ul>
<button onclick="getMyTrainings()">Load Trainings</button>

<ul id="trainingList"></ul>

<script src="script.js"></script>

<script>
    window.onload = async function() {
      const token = localStorage.getItem("token");
      if (!token) {
        window.location.href = "index.html";
        return;
      }

      if (typeof myTrainings === "function") await myTrainings();
    }
  </script>

</body>
</html>
