<!DOCTYPE html>

<html>
<head>
<title>Trainer Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard">

<div class="sidebar">
  <h2>Trainer</h2>
  <button onclick="myTrainings()">My Trainings</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

<h2>Create Training</h2>

<div class="card-box">
  <input id="trainingName" placeholder="Training Name"><br><br>
  <input id="description" placeholder="Description"><br><br>
  <input id="seatLimit" placeholder="Seat Limit"><br><br>

<button class="action-btn" onclick="createTraining()">Create</button>

</div>

<h2>My Trainings</h2>
<div id="trainerTrainings"></div>

</div>

<script src="script.js"></script>

<script>
window.onload = async function() {
  const token = localStorage.getItem("token");
  if (!token) {
    window.location.href = "index.html";
    return;
  }

  await myTrainings();
}
</script>

</body>
</html>
